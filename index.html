<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROWSE-MAXXING | The Web OS</title>
    <link rel="icon" type="image/x-icon" href="https://github.githubassets.com/favicons/favicon.svg">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #f5f5f7;
            --text-dim: #86868b;
            --accent-color: #0071e3;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blur-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .logo {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.01em;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 12px;
            margin-left: 24px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text-color);
        }

        main {
            height: 100vh;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            will-change: transform;
        }

        section {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 10% 0 10%;
            position: relative;
        }

        /* Showcase Layout Structures */
        .showcase-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            align-items: flex-start;
            gap: 80px;
        }

        .showcase-container.reverse {
            flex-direction: row-reverse;
        }

        .showcase-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-self: flex-start;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            transition-delay: 0.2s;
        }

        section.active .showcase-text {
            opacity: 1;
            transform: translateY(0);
        }

        .tagline {
            color: var(--accent-color);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.1em;
        }

        h2 {
            font-size: 44px;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }

        .desc {
            color: var(--text-dim);
            font-size: 18px;
            line-height: 1.5;
            font-weight: 400;
        }

        .showcase-visual {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-self: flex-start;
        }

        .media-box {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .standard-container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            align-self: flex-start;
        }

        /* EXTENDED 4-ROW BRICK CAROUSEL MULTI-TRACK SYSTEM */
        .carousel-track-container {
            width: 100%;
            overflow: hidden;
            padding: 10px 0;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 14px; /* Row spacing vectors */
            mask-image: linear-gradient(to right, transparent, #000 15%, #000 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, #000 15%, #000 85%, transparent);
        }

        .carousel-track {
            display: flex;
            gap: 20px;
            width: max-content;
        }

        /* Automated 4-Row Alternation Vector Configuration */
        .carousel-track.row-1, .carousel-track.row-3 {
            animation: loopScrollerRTL 120s linear infinite;
        }

        .carousel-track.row-2, .carousel-track.row-4 {
            animation: loopScrollerLTR 120s linear infinite;
        }

        .carousel-track:hover {
            animation-play-state: paused;
        }

        .idea-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            color: var(--text-color);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        /* 3-ROW TRIPLE MARQUEE ENGINE FOR BRANDS */
        .marquee-wrapper {
            margin-top: 40px;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 24px;
            mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
        }

        .marquee-inner {
            display: flex;
            gap: 60px;
            width: max-content;
        }

        .marquee-inner.row-1, .marquee-inner.row-3 {
            animation: loopScrollerRTL 50s linear infinite;
        }

        .marquee-inner.row-2 {
            animation: loopScrollerLTR 50s linear infinite;
        }

        .marquee-inner:hover {
            animation-play-state: paused;
        }

        .marquee-item {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-dim);
            text-transform: lowercase;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        /* SEAMLESS HARDWARE-ACCELERATED TRANSFORMATION VECTORS */
        @keyframes loopScrollerRTL {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        @keyframes loopScrollerLTR {
            0% { transform: translate3d(-50%, 0, 0); }
            100% { transform: translate3d(0, 0, 0); }
        }

        /* Layout Framework Grids */
        .price-grid {
            display: flex;
            gap: 30px;
            margin-top: 40px;
            justify-content: center;
        }

        .price-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 40px;
            flex: 1;
            max-width: 350px;
            backdrop-filter: blur(20px);
            text-align: left;
        }

        .price-card.featured {
            border-color: var(--accent-color);
        }

        .price-num {
            font-size: 36px;
            font-weight: 700;
            margin: 15px 0;
        }

        .faq-wrap {
            margin-top: 40px;
            text-align: left;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .faq-item {
            border-bottom: 1px solid var(--glass-border);
            padding: 24px 0;
        }

        .faq-q {
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .faq-a {
            color: var(--text-dim);
            margin-top: 12px;
            line-height: 1.5;
            display: none;
        }

        .install-box {
            text-align: left; 
            max-width: 550px; 
            margin: 0 auto; 
            background: var(--glass-bg); 
            border:1px solid var(--glass-border); 
            padding:30px; 
            border-radius:14px;
        }

        .install-step {
            margin-bottom: 12px;
        }
        .install-step:last-child {
            margin-bottom: 0;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            padding: 12px 24px;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
            margin-top: 40px;
        }

        .btn:hover {
            background-color: #0077ed;
            transform: scale(1.02);
        }

        .dots-indicator {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .dot.active {
            background-color: var(--text-color);
        }
    </style>
</head>

                    carouselIdeas: [

                },
                {

                    navLabel: "Pricing",
                    tagline: "Acquisition",
                    title: "Flexible Workspace Tiers",
                    tiers: [
                        { name: "Community", price: "$0", desc: "Core UI elements, bionic syntax highlighting engine presets, and client variables local sync arrays.", featured: false },
                        { name: "Enterprise Max", price: "$19", desc: "Unlimited Node Builder actions, Google Firebase multi-device hardware verification layers, and automation nodes.", featured: true }
                    ]
                },
                {
                    type: "faq",
                    navLabel: "FAQ",
                    tagline: "Knowledge Base",
                    title: "Frequently Asked Queries",
                    faqs: [
                        { q: "Is my personal automation code private?", a: "Yes. Your script data configurations run completely isolated within local system runtime storage or verified Google Cloud parameters." },
                        { q: "Does it conflict with security banking layers?", a: "No. Built-in hardwired parsing modules drop active tracking features instantly upon finding validated banking subdomains." }
                    ],
                    actionButton: {
                        text: "Initialize Download Workspace",
                        href: "https://github.com"
                    }
                }
            ]
        };

        const mainContainer = document.getElementById('scrollContainer');
        const navLinks = document.getElementById('navLinks');
        const dotsIndicator = document.getElementById('dotsIndicator');

        let currentIndex = 0;
        let isScrolling = false;
        let showcaseCounter = 0; 
        const totalSections = landingPagesConfig.sections.length;

        function buildWebsiteArchitecture() {
            landingPagesConfig.sections.forEach((sectionData, idx) => {
                if (sectionData.navLabel) {
                    const navAnchor = document.createElement('a');
                    navAnchor.href = "#";
                    navAnchor.textContent = sectionData.navLabel;
                    navAnchor.addEventListener('click', (e) => { e.preventDefault(); scrollToIndex(idx); });
                    navLinks.appendChild(navAnchor);
                }

                const dot = document.createElement('div');
                dot.classList.add('dot');
                if (idx === 0) dot.classList.add('active');
                dot.addEventListener('click', () => scrollToIndex(idx));
                dotsIndicator.appendChild(dot);

                const sectionEl = document.createElement('section');
                if (idx === 0) sectionEl.classList.add('active');

                if (sectionData.type === "showcase") {
                    const isEven = (showcaseCounter % 2 === 0);
                    showcaseCounter++;
                    
                    sectionEl.innerHTML = `
                        <div class="showcase-container ${isEven ? '' : 'reverse'}">
                            <div class="showcase-text">
                                <div class="tagline">${sectionData.tagline}</div>
                                <h2>${sectionData.title}</h2>
                                <div class="desc">${sectionData.desc}</div>
                            </div>
                            <div class="showcase-visual">
                                <div class="media-box">
                                    <img src="" data-source-url="${sectionData.gifUrl}" alt="${sectionData.title}">
                                </div>
                            </div>
                        </div>`;
                } 
                else if (sectionData.type === "upcoming-carousel") {
                    // Segment arrays evenly into 4 clean tracking slices
                    const sliceCount = Math.ceil(sectionData.carouselIdeas.length / 4);
                    const part1 = sectionData.carouselIdeas.slice(0, sliceCount);
                    const part2 = sectionData.carouselIdeas.slice(sliceCount, sliceCount * 2);
                    const part3 = sectionData.carouselIdeas.slice(sliceCount * 2, sliceCount * 3);
                    const part4 = sectionData.carouselIdeas.slice(sliceCount * 3);

                    // Duplicate segments to fill up transformation widths seamlessly
                    const row1Markup = [...part1, ...part1, ...part1].map(i => `<div class="idea-card">${i}</div>`).join('');
                    const row2Markup = [...part2, ...part2, ...part2].map(i => `<div class="idea-card">${i}</div>`).join('');
                    const row3Markup = [...part3, ...part3, ...part3].map(i => `<div class="idea-card">${i}</div>`).join('');
                    const row4Markup = [...part4, ...part4, ...part4].map(i => `<div class="idea-card">${i}</div>`).join('');
                    
                    sectionEl.innerHTML = `
                        <div class="standard-container">
                            <div class="tagline">${sectionData.tagline}</div>
                            <h2>${sectionData.title}</h2>
                            <p class="desc" style="margin-bottom: 40px;">${sectionData.desc}</p>
                            <div class="carousel-track-container">
                                <div class="carousel-track row-1">${row1Markup}</div>
                                <div class="carousel-track row-2">${row2Markup}</div>
                                <div class="carousel-track row-3">${row3Markup}</div>
                                <div class="carousel-track row-4">${row4Markup}</div>
                            </div>
                        </div>`;
                }
                else if (sectionData.type === "marquee-brand") {
                    const sliceCount = Math.ceil(sectionData.brands.length / 3);
                    const part1 = sectionData.brands.slice(0, sliceCount);
                    const part2 = sectionData.brands.slice(sliceCount, sliceCount * 2);
                    const part3 = sectionData.brands.slice(sliceCount * 2);

                    const row1Markup = [...part1, ...part1, ...part1, ...part1].map(b => `<div class="marquee-item">${b}</div>`).join('');
                    const row2Markup = [...part2, ...part2, ...part2, ...part2].map(b => `<div class="marquee-item">${b}</div>`).join('');
                    const row3Markup = [...part3, ...part3, ...part3, ...part3].map(b => `<div class="marquee-item">${b}</div>`).join('');
                    
                    sectionEl.innerHTML = `
                        <div class="standard-container">
                            <div class="tagline">${sectionData.tagline}</div>
                            <h2>${sectionData.title}</h2>
                            <p class="desc">${sectionData.desc}</p>
                            <div class="marquee-wrapper">
                                <div class="marquee-inner row-1">${row1Markup}</div>
                                <div class="marquee-inner row-2">${row2Markup}</div>
                                <div class="marquee-inner row-3">${row3Markup}</div>
                            </div>
                        </div>`;
                }
                else if (sectionData.type === "install") {
                    const stepsMarkup = sectionData.steps.map((step, i) => `
                        <div class="install-step"><strong>Step ${i + 1}:</strong> ${step}</div>
                    `).join('');
                    sectionEl.innerHTML = `
                        <div class="standard-container">
                            <div class="tagline">${sectionData.tagline}</div>
                            <h2>${sectionData.title}</h2>
                            <p class="desc" style="margin-bottom: 30px;">${sectionData.desc}</p>
                            <div class="install-box">${stepsMarkup}</div>
                        </div>`;
                } 
                else if (sectionData.type === "pricing") {
                    const cardsMarkup = sectionData.tiers.map(tier => `
                        <div class="price-card ${tier.featured ? 'featured' : ''}">
                            <h3>${tier.name}</h3>
                            <div class="price-num">${tier.price}</div>
                            <p style="color: var(--text-dim);">${tier.desc}</p>
                        </div>
                    `).join('');
                    sectionEl.innerHTML = `
                        <div class="standard-container">
                            <div class="tagline">${sectionData.tagline}</div>
                            <h2>${sectionData.title}</h2>
                            <div class="price-grid">${cardsMarkup}</div>
                        </div>`;
                } 
                else if (sectionData.type === "faq") {
                    const faqMarkup = sectionData.faqs.map(faq => `
                        <div class="faq-item">
                            <div class="faq-q">${faq.q} <span>+</span></div>
                            <div class="faq-a">${faq.a}</div>
                        </div>
                    `).join('');
                    sectionEl.innerHTML = `
                        <div class="standard-container">
                            <div class="tagline">${sectionData.tagline}</div>
                            <h2>${sectionData.title}</h2>
                            <div class="faq-wrap">${faqMarkup}</div>
                            <div><a href="${sectionData.actionButton.href}" class="btn">${sectionData.actionButton.text}</a></div>
                        </div>`;
                }

                mainContainer.appendChild(sectionEl);
            });
        }

        buildWebsiteArchitecture();
        const compiledSections = document.querySelectorAll('section');
        const compiledDots = document.querySelectorAll('.dot');

        // Layout Scroll Snap Transition Engine
        function scrollToIndex(index) {
            if (index < 0 || index >= totalSections) return;
            isScrolling = true;
            currentIndex = index;

            mainContainer.style.transform = `translateY(-${currentIndex * 100}vh)`;

            compiledSections.forEach((sec, idx) => {
                idx === currentIndex ? sec.classList.add('active') : sec.classList.remove('active');
            });

            compiledDots.forEach((dot, idx) => {
                idx === currentIndex ? dot.classList.add('active') : dot.classList.remove('active');
            });

            manageTargetGifStates(compiledSections[currentIndex]);

            setTimeout(() => { isScrolling = false; }, 800);
        }

        function manageTargetGifStates(activeSection) {
            // document.querySelectorAll('section img').forEach(img => img.src = '');
            
            const dynamicImg = activeSection.querySelector('img[data-source-url]');
            if (dynamicImg) {
                const pureUrl = dynamicImg.getAttribute('data-source-url');
                dynamicImg.src = pureUrl + '?epoch=' + new Date().getTime();
            }
        }

        window.addEventListener('wheel', (e) => {
            if (isScrolling) return;
            if (e.deltaY > 25 && currentIndex < totalSections - 1) {
                scrollToIndex(currentIndex + 1);
            } else if (e.deltaY < -25 && currentIndex > 0) {
                scrollToIndex(currentIndex - 1);
            }
        }, { passive: true });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('touchend', (e) => {
            if (isScrolling) return;
            let distance = touchStartY - e.changedTouches[0].clientY;
            if (distance > 50 && currentIndex < totalSections - 1) {
                scrollToIndex(currentIndex + 1);
            } else if (distance < -50 && currentIndex > 0) {
                scrollToIndex(currentIndex - 1);
            }
        }, { passive: true });

        document.addEventListener('click', (e) => {
            const header = e.target.closest('.faq-q');
            if (!header) return;
            const answer = header.nextElementSibling;
            const marker = header.querySelector('span');
            if (answer.style.display === 'block') {
                answer.style.display = 'none';
                marker.textContent = '+';
            } else {
                answer.style.display = 'block';
                marker.textContent = '-';
            }
        });

        manageTargetGifStates(compiledSections[0]);
    </script>
</body>
</html>
